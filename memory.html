<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wachtwoord Memory Spel</title>
    <style>
        /* ... alle styles blijven hetzelfde ... */
    </style>
</head>
<body>

<div class="container" id="app">
    <h1>🔐 Wachtwoord Memory</h1>
    <p class="subtitle">Onthoud de geheimen en vind de paren!</p>

    <!-- Stap 1: Namen invoeren -->
    <div id="step-input">
        <div class="input-section">
            <label for="nameInput">👦 Voer de namen in (één per regel):</label>
            <textarea id="nameInput" placeholder="Jan&#10;Piet&#10;Kees&#10;Barry"></textarea>
            <div class="input-actions">
                <button id="startGameBtn">🚀 Start</button>
                <button id="clearBtn" class="btn-clear">🗑️ Leegmaken</button>
            </div>
        </div>
        <div id="statusMessage" class="status-message info">Voeg minimaal 2 namen toe (even aantal).</div>
        <div class="name-list" id="nameListContainer"></div>
    </div>

    <!-- Stap 2: Spel -->
    <div id="step-game" class="hidden">
        <div class="game-area fade-in" id="gameArea">
            <div class="turn-indicator" id="turnIndicator">Beurt: <span id="currentTurnName">-</span></div>
            <div class="secret-display" id="secretDisplay">🌸</div>
            <div class="score-display" id="scoreDisplay">⭐ 0 punten</div>
            <div class="info-text" id="gameInfo">Klik op 'Volgende' om het volgende kind te tonen.</div>
            <div class="button-group">
                <button class="btn-next" id="nextBtn">➡️ Volgende</button>
                <button class="btn-good" id="goodBtn" disabled>✅ Goed geraden!</button>
                <button class="btn-reset" id="resetBtn">🔄 Opnieuw</button>
            </div>
        </div>
    </div>

    <!-- Stap 3: Eindscore -->
    <div id="step-final" class="hidden">
        <div class="final-screen fade-in">
            <h2>🏆 Einduitslag</h2>
            <ul class="final-score-list" id="finalScoreList"></ul>
            <button class="btn-restart" id="restartBtn">🔄 Nieuw spel</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---- DOM refs ----
        const stepInput = document.getElementById('step-input');
        const stepGame = document.getElementById('step-game');
        const stepFinal = document.getElementById('step-final');

        const nameInput = document.getElementById('nameInput');
        const startGameBtn = document.getElementById('startGameBtn');
        const clearBtn = document.getElementById('clearBtn');
        const nameListContainer = document.getElementById('nameListContainer');
        const statusMessage = document.getElementById('statusMessage');

        const turnIndicator = document.getElementById('turnIndicator');
        const currentTurnName = document.getElementById('currentTurnName');
        const secretDisplay = document.getElementById('secretDisplay');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const gameInfo = document.getElementById('gameInfo');
        const nextBtn = document.getElementById('nextBtn');
        const goodBtn = document.getElementById('goodBtn');
        const resetBtn = document.getElementById('resetBtn');
        const restartBtn = document.getElementById('restartBtn');

        const finalScoreList = document.getElementById('finalScoreList');

        // ---- State ----
        let names = [];
        let gameData = null;
        let isGameActive = false;

        // ---- Hulpfuncties ----
        function parseNames(text) {
            return text.split(/\n/)
                .map(s => s.trim())
                .filter(s => s.length > 0);
        }

        function updateNameList() {
            nameListContainer.innerHTML = '';
            names.forEach(n => {
                const span = document.createElement('span');
                span.className = 'name-tag';
                span.textContent = n;
                nameListContainer.appendChild(span);
            });

            const count = names.length;
            if (count === 0) {
                statusMessage.className = 'status-message info';
                statusMessage.textContent = 'Voeg minimaal 2 namen toe (even aantal).';
                startGameBtn.disabled = true;
                return;
            }

            if (count % 2 !== 0) {
                statusMessage.className = 'status-message error';
                statusMessage.textContent = `⚠️ ${count} namen is oneven. Voeg nog een naam toe.`;
                startGameBtn.disabled = true;
            } else {
                statusMessage.className = 'status-message success';
                statusMessage.textContent = `✅ ${count} namen geladen. Klik op "Start" om te beginnen!`;
                startGameBtn.disabled = false;
            }
        }

        function loadNamesFromTextarea() {
            const raw = nameInput.value;
            const parsed = parseNames(raw);
            if (parsed.length === 0) {
                names = [];
            } else {
                // Check op duplicaten
                const unique = [...new Set(parsed)];
                if (unique.length !== parsed.length) {
                    statusMessage.className = 'status-message error';
                    statusMessage.textContent = '⚠️ Dubbele namen zijn niet toegestaan.';
                    startGameBtn.disabled = true;
                    names = [];
                    updateNameList();
                    return;
                }
                names = parsed;
            }
            updateNameList();
        }

        // ---- Nieuwe functie: leerlingen laden uit JSON ----
        async function loadLeerlingen() {
            try {
                const response = await fetch('leerlingen.json');
                if (!response.ok) {
                    throw new Error('JSON bestand niet gevonden');
                }
                const data = await response.json();
                
                // Haal alleen de namen uit de leerlingen array
                const namen = data.leerlingen.map(leerling => leerling.naam);
                
                // Zet de namen in het tekstveld (één per regel)
                nameInput.value = namen.join('\n');
                
                // Laad de namen in de lijst
                loadNamesFromTextarea();
                
                statusMessage.className = 'status-message success';
                statusMessage.textContent = `✅ ${namen.length} leerlingen geladen uit leerlingen.json`;
            } catch (error) {
                statusMessage.className = 'status-message error';
                statusMessage.textContent = '⚠️ Kon leerlingen.json niet laden. Voer handmatig namen in.';
                console.error('Fout bij laden van leerlingen.json:', error);
            }
        }

        // ---- Event: tekstveld verandert ----
        nameInput.addEventListener('input', loadNamesFromTextarea);

        // ---- Leegmaken ----
        clearBtn.addEventListener('click', function() {
            nameInput.value = '';
            names = [];
            updateNameList();
            statusMessage.className = 'status-message info';
            statusMessage.textContent = 'Voer namen in (één per regel).';
            startGameBtn.disabled = true;
        });

        // ---- Start spel ----
        startGameBtn.addEventListener('click', function() {
            // Laad opnieuw om zeker te zijn
            loadNamesFromTextarea();
            if (names.length === 0 || names.length % 2 !== 0) {
                return;
            }

            // Genereer geheimen
            const total = names.length;
            const totalPairs = total / 2;

            // Lijst met mogelijke geheimen (woorden, tekens, cijfers)
            const secretsPool = [
                '🌸 bloem', '🚪 deur', '🌳 boom', '🏫 school', '📚 boek',
                '⭐ ster', '🌈 regenboog', '🍎 appel', '🐱 kat', '🐶 hond',
                '🦋 vlinder', '🌞 zon', '🌙 maan', '❤️ hart', '🧸 beer',
                '#', '@', '?', '!', '&', '%', '+', '=', '~', '€', '$',
                '1', '2', '3', '4', '5', '6', '7', '8', '9', '0'
            ];

            // Kies totalPairs unieke geheimen
            const shuffledSecrets = [...secretsPool].sort(() => Math.random() - 0.5);
            const chosen = shuffledSecrets.slice(0, totalPairs);
            // Elk geheim komt 2x voor
            let secretAssignments = [];
            chosen.forEach(s => {
                secretAssignments.push(s, s);
            });
            // Schud de toewijzingen
            for (let i = secretAssignments.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [secretAssignments[i], secretAssignments[j]] = [secretAssignments[j], secretAssignments[i]];
            }

            // Maak willekeurige volgorde voor de kinderen
            const order = [...names];
            for (let i = order.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [order[i], order[j]] = [order[j], order[i]];
            }

            // Bouw secrets map
            const secrets = {};
            order.forEach((name, idx) => {
                secrets[name] = secretAssignments[idx];
            });

            // Scores initialiseren
            const scores = {};
            names.forEach(n => { scores[n] = 0; });

            gameData = {
                order: order,
                secrets: secrets,
                scores: scores,
                currentIndex: 0,
                phase: 'reveal',
                totalPairs: totalPairs,
                foundPairs: 0,
                allRevealed: false
            };

            isGameActive = true;

            // UI wisselen
            stepInput.classList.add('hidden');
            stepGame.classList.remove('hidden');
            stepFinal.classList.add('hidden');

            // Start met reveal fase
            showRevealStep();
        });

        // ---- Reveal fase ----
        function showRevealStep() {
            if (!gameData) return;
            const idx = gameData.currentIndex;
            const order = gameData.order;
            if (idx >= order.length) {
                // Alle geheimen zijn getoond -> ga naar speelfase
                gameData.phase = 'play';
                gameData.currentIndex = 0;
                showPlayStep();
                return;
            }
            const name = order[idx];
            const secret = gameData.secrets[name];
            currentTurnName.textContent = name;
            secretDisplay.textContent = secret;
            scoreDisplay.textContent = `⭐ ${gameData.scores[name]} punten`;
            gameInfo.textContent = `Geheim tonen (${idx+1}/${order.length})`;
            goodBtn.disabled = true;
            nextBtn.disabled = false;
            // Volgende knop gaat naar volgende reveal of naar play
            nextBtn.onclick = function() {
                gameData.currentIndex++;
                showRevealStep();
            };
            // Reset
            resetBtn.onclick = resetGame;
        }

        // ---- Speelfase ----
        function showPlayStep() {
            if (!gameData) return;
            const order = gameData.order;
            const idx = gameData.currentIndex;
            // Check of alle paren gevonden zijn
            if (gameData.foundPairs >= gameData.totalPairs) {
                showFinalScreen();
                return;
            }
            // Als de index voorbij de lijst is, begin opnieuw bij 0
            if (idx >= order.length) {
                gameData.currentIndex = 0;
                showPlayStep();
                return;
            }
            const name = order[idx];
            currentTurnName.textContent = name;
            secretDisplay.textContent = '❓';
            scoreDisplay.textContent = `⭐ ${gameData.scores[name]} punten`;
            gameInfo.textContent = `${name} is aan de beurt! Noem twee kinderen.`;
            goodBtn.disabled = false;
            nextBtn.disabled = false;

            // Volgende knop: ga naar volgende speler (alleen als speler stopt of fout heeft)
            nextBtn.onclick = function() {
                gameData.currentIndex++;
                showPlayStep();
            };

            // Goed geraden knop: speler blijft aan de beurt!
            goodBtn.onclick = function() {
                const currentName = order[gameData.currentIndex];
                gameData.scores[currentName] = (gameData.scores[currentName] || 0) + 1;
                gameData.foundPairs++;
                scoreDisplay.textContent = `⭐ ${gameData.scores[currentName]} punten`;
                // Kijk of alle paren gevonden zijn
                if (gameData.foundPairs >= gameData.totalPairs) {
                    showFinalScreen();
                } else {
                    // Blijf bij dezelfde speler! Geen currentIndex++
                    showPlayStep(); // Herlaad het scherm met dezelfde speler
                }
            };

            // Reset
            resetBtn.onclick = resetGame;
        }

        // ---- Eindscherm ----
        function showFinalScreen() {
            stepGame.classList.add('hidden');
            stepFinal.classList.remove('hidden');
            // Sorteer scores
            const sorted = names.slice().sort((a, b) => (gameData.scores[b] || 0) - (gameData.scores[a] || 0));
            const list = document.getElementById('finalScoreList');
            list.innerHTML = '';
            sorted.forEach((name, index) => {
                const li = document.createElement('li');
                const rank = document.createElement('span');
                rank.className = 'rank';
                rank.textContent = index + 1;
                const nameSpan = document.createElement('span');
                nameSpan.textContent = name;
                const scoreSpan = document.createElement('span');
                scoreSpan.textContent = `${gameData.scores[name] || 0} punt${(gameData.scores[name] || 0) !== 1 ? 'en' : ''}`;
                li.appendChild(rank);
                li.appendChild(nameSpan);
                li.appendChild(scoreSpan);
                list.appendChild(li);
            });
            restartBtn.onclick = resetGame;
        }

        // ---- Reset ----
        function resetGame() {
            gameData = null;
            isGameActive = false;
            stepInput.classList.remove('hidden');
            stepGame.classList.add('hidden');
            stepFinal.classList.add('hidden');
            // Reset knoppen
            nextBtn.onclick = null;
            goodBtn.onclick = null;
            // Herlaad de namen uit het tekstveld
            loadNamesFromTextarea();
        }

        // ---- Aangepaste initialisatie ----
        // Bij laden, probeer eerst leerlingen.json te laden
        // Anders check of er al tekst staat
        async function initialize() {
            // Eerst proberen we leerlingen.json te laden
            await loadLeerlingen();
            
            // Als er nog geen namen zijn geladen (bijv. JSON bestand mist),
            // check dan of er handmatig tekst is ingevoerd
            if (nameInput.value.trim() === '') {
                updateNameList();
            }
        }

        // ---- Start de initialisatie ----
        initialize();

        // ---- Auto-start bij Enter? Nee, we gebruiken de startknop ----

    })();
</script>

</body>
</html>
