<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timerspel - twee spelers 🎯</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .app {
            max-width: 1300px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 60px;
            padding: 30px 35px 40px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
            border: 3px solid #f9b83a;
        }
        h1 {
            text-align: center;
            font-size: 2.8rem;
            color: #2d1f0f;
            margin-bottom: 4px;
        }
        .subtitle {
            text-align: center;
            font-size: 1.4rem;
            color: #6b4f32;
            margin-bottom: 20px;
        }
        /* ===== SPLIT-SCREEN TIMER ===== */
        .split {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin: 10px 0 20px;
        }
        .player-box {
            flex: 1;
            background: #fcf8f2;
            border-radius: 40px;
            padding: 20px 20px 25px;
            text-align: center;
            border: 4px solid #e5d9cd;
            box-shadow: 0 12px 0 #d6c6b5;
            min-width: 200px;
        }
        .player-box.speler1 {
            border-color: #6fcf97;
        }
        .player-box.speler2 {
            border-color: #f28b82;
        }
        .player-name {
            font-size: 2.2rem;
            font-weight: 700;
            color: #2d1f0f;
            background: #f2e3d4;
            display: inline-block;
            padding: 6px 28px;
            border-radius: 80px;
            margin-bottom: 10px;
        }
        .timer-display {
            font-size: 7rem;
            font-weight: 800;
            background: #2d1f0f;
            color: #f9d89c;
            padding: 10px 20px;
            border-radius: 60px;
            margin: 8px 0;
            letter-spacing: 4px;
            font-variant-numeric: tabular-nums;
            min-height: 130px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .timer-display.ready {
            color: #6fcf97;
            font-size: 2.5rem;
        }
        .score-display {
            font-size: 3rem;
            font-weight: 700;
            background: #f9b83a;
            padding: 6px 30px;
            border-radius: 80px;
            display: inline-block;
            margin: 6px 0;
            min-width: 100px;
        }
        .score-display.waiting {
            background: #e5d9cd;
            color: #a08f7e;
        }
        .key-hint {
            font-size: 1.2rem;
            background: #2d1f0f;
            color: white;
            padding: 6px 18px;
            border-radius: 40px;
            display: inline-block;
            margin-top: 6px;
        }
        .key-hint.spatie {
            background: #219653;
        }
        .key-hint.enter {
            background: #b23c33;
        }
        .status-text {
            font-size: 1.2rem;
            color: #6b4f32;
            margin-top: 4px;
            min-height: 28px;
            font-weight: 600;
        }
        /* ===== KNOBBEN ===== */
        .btn {
            background: #f9b83a;
            border: none;
            color: #2d1f0f;
            font-weight: 700;
            font-size: 1.6rem;
            padding: 16px 38px;
            border-radius: 120px;
            cursor: pointer;
            box-shadow: 0 8px 0 #b57c1e;
            transition: all 0.07s ease;
            border: 2px solid #ffeac2;
            letter-spacing: 1px;
        }
        .btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #b57c1e;
        }
        .btn:disabled {
            opacity: 0.4;
            transform: translateY(4px);
            box-shadow: 0 4px 0 #b57c1e;
            pointer-events: none;
        }
        .btn-secondary {
            background: #e5d9cd;
            box-shadow: 0 8px 0 #a08f7e;
            border-color: #f3ede7;
            color: #3d2c1b;
        }
        .btn-success {
            background: #6fcf97;
            box-shadow: 0 8px 0 #219653;
            border-color: #b8f0d0;
            color: #1a3a2a;
        }
        .btn-danger {
            background: #f28b82;
            box-shadow: 0 8px 0 #b23c33;
            border-color: #fcd4d0;
            color: #3d1c1a;
        }
        .btn-small {
            font-size: 1.3rem;
            padding: 12px 28px;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px;
            margin-top: 20px;
        }
        .flex-center {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }
        .hidden {
            display: none !important;
        }
        .progress {
            text-align: center;
            font-size: 1.3rem;
            color: #6b4f32;
            margin-top: 12px;
            background: #f2e3d4;
            padding: 8px 24px;
            border-radius: 80px;
            display: inline-block;
        }
        /* ===== SCORE OVERZICHT ===== */
        .score-overzicht {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 4px dashed #d6c6b5;
        }
        .score-overzicht h2 {
            font-size: 1.8rem;
            color: #2d1f0f;
            text-align: center;
            margin-bottom: 12px;
        }
        .score-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 10px 18px;
            max-height: 200px;
            overflow-y: auto;
            padding: 6px 10px;
            background: #fcf8f2;
            border-radius: 30px;
            border: 2px solid #e5d9cd;
        }
        .score-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px 8px 20px;
            background: white;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #2d1f0f;
            box-shadow: 0 3px 0 #d6c6b5;
            border: 1px solid #f2e3d4;
        }
        .score-item .naam {
            flex: 1;
        }
        .score-item .score {
            background: #f9b83a;
            padding: 2px 16px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1.3rem;
        }
        .score-item .score.geen {
            background: #e5d9cd;
            color: #a08f7e;
        }
        .score-item .medaille {
            font-size: 1.5rem;
            margin-right: 6px;
        }
        .score-item.beste {
            background: #fff6d0;
            border-color: #f9b83a;
        }
        .score-grid::-webkit-scrollbar {
            width: 8px;
        }
        .score-grid::-webkit-scrollbar-thumb {
            background: #d6c6b5;
            border-radius: 10px;
        }
        .score-grid::-webkit-scrollbar-track {
            background: #f2e3d4;
            border-radius: 10px;
        }
        @media (max-width: 800px) {
            .split { flex-direction: column; }
            .timer-display { font-size: 4.5rem; min-height: 90px; }
            .app { padding: 20px; }
            h1 { font-size: 2rem; }
            .score-grid { max-height: 150px; }
        }
        @media (min-width: 1200px) {
            .score-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
        }
    </style>
</head>
<body>
<div class="app">

    <h1>⏱️ Timerspel</h1>
    <div class="subtitle">Twee spelers tegelijk! Tik zo dicht mogelijk bij <strong>0</strong></div>

    <!-- ===== SPLIT-SCREEN TIMER ===== -->
    <div class="split" id="spelerContainer">
        <!-- Speler 1 (links) -->
        <div class="player-box speler1" id="speler1Box">
            <div class="player-name" id="speler1Naam">👤 ...</div>
            <div class="timer-display ready" id="speler1Timer">⏳</div>
            <div class="score-display waiting" id="speler1Score">⭐ ?</div>
            <div class="key-hint spatie">🟢 Spatiebalk</div>
            <div class="status-text" id="speler1Status">Wacht op start...</div>
        </div>

        <!-- Speler 2 (rechts) -->
        <div class="player-box speler2" id="speler2Box">
            <div class="player-name" id="speler2Naam">👤 ...</div>
            <div class="timer-display ready" id="speler2Timer">⏳</div>
            <div class="score-display waiting" id="speler2Score">⭐ ?</div>
            <div class="key-hint enter">🟠 Numerieke Enter</div>
            <div class="status-text" id="speler2Status">Wacht op start...</div>
        </div>
    </div>

    <!-- ===== KNOBBEN ===== -->
    <div class="flex-center" style="gap:20px; margin:6px 0;">
        <button class="btn btn-success" id="btnStart">▶️ START</button>
    </div>

    <div class="btn-group">
        <button class="btn btn-secondary btn-small" id="btnVorige">⬅️ Vorige</button>
        <button class="btn btn-small" id="btnVolgende">Volgende ➡️</button>
        <button class="btn btn-danger btn-small" id="btnReset">🔄 Reset</button>
    </div>

    <div class="flex-center">
        <span class="progress" id="timerProgress">0 van 0 leerlingen (ronde 1/2)</span>
    </div>

    <!-- ===== SCORE OVERZICHT ===== -->
    <div class="score-overzicht" id="scoreOverzicht">
        <h2>📊 Beste scores per leerling</h2>
        <div class="score-grid" id="scoreGrid">
            <div style="text-align:center; color:#a08f7e; padding:12px; grid-column:1/-1;">
                Nog geen scores...
            </div>
        </div>
    </div>

</div>

<script>
    // ============================================================
    // DATA WORDT GELADEN VANUIT JSON BESTAND
    // ============================================================
    let LEERLINGEN = [];
    let ALLE_SCORES = {}; // { "naam": besteScore }

    async function laadData() {
        try {
            const response = await fetch('leerlingen.json');
            if (!response.ok) throw new Error('JSON bestand niet gevonden');
            const data = await response.json();
            LEERLINGEN = data.leerlingen.map(l => l.naam);
            // Reset scores
            ALLE_SCORES = {};
            LEERLINGEN.forEach(naam => { ALLE_SCORES[naam] = null; });
            init();
        } catch (error) {
            console.error('Fout bij laden data:', error);
            alert('❌ Kon leerlingen.json niet laden! Zorg dat het bestand in dezelfde map staat.');
        }
    }

    // ============================================================
    // STATE
    // ============================================================
    let state = {
        volgorde: [],
        index: 0,
        ronde: 1, // 1 of 2
        timerRunning: false,
        timerStart: 0,
        timerInterval: null,
        timerValue: 5,
        speler1Gedaan: false,
        speler2Gedaan: false,
        speler1Score: null,
        speler2Score: null,
        // Per leerling worden de twee pogingen opgeslagen
        pogingen1: {}, // { index: [poging1, poging2] }
        pogingen2: {}
    };

    // ============================================================
    // INIT
    // ============================================================
    function init() {
        if (LEERLINGEN.length === 0) return;

        // Random volgorde
        const indices = LEERLINGEN.map((_, i) => i);
        for (let i = indices.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [indices[i], indices[j]] = [indices[j], indices[i]];
        }
        state.volgorde = indices;
        state.index = 0;
        state.ronde = 1;
        state.pogingen1 = {};
        state.pogingen2 = {};
        state.speler1Score = null;
        state.speler2Score = null;
        state.timerRunning = false;
        if (state.timerInterval) {
            clearInterval(state.timerInterval);
            state.timerInterval = null;
        }

        // Reset ALLE_SCORES (alleen null zetten, niet verwijderen)
        LEERLINGEN.forEach(naam => { ALLE_SCORES[naam] = null; });

        updateUI();
        updateKnoppen();
        updateScoreOverzicht();
    }

    // ============================================================
    // UI UPDATE
    // ============================================================
    function updateUI() {
        const idx = state.volgorde[state.index];
        const naam = LEERLINGEN[idx] || '...';

        document.getElementById('speler1Naam').textContent = '👤 ' + naam;
        document.getElementById('speler2Naam').textContent = '👤 ' + naam;

        document.getElementById('timerProgress').textContent =
            `${state.index + 1} van ${LEERLINGEN.length} leerlingen (ronde ${state.ronde}/2)`;

        if (!state.timerRunning) {
            document.getElementById('speler1Timer').textContent = '⏳';
            document.getElementById('speler1Timer').className = 'timer-display ready';
            document.getElementById('speler2Timer').textContent = '⏳';
            document.getElementById('speler2Timer').className = 'timer-display ready';
        }

        const s1 = state.speler1Score;
        const s2 = state.speler2Score;

        const score1El = document.getElementById('speler1Score');
        const score2El = document.getElementById('speler2Score');

        if (s1 !== null) {
            score1El.textContent = '⭐ ' + s1.toFixed(1);
            score1El.className = 'score-display';
        } else {
            score1El.textContent = '⭐ ?';
            score1El.className = 'score-display waiting';
        }

        if (s2 !== null) {
            score2El.textContent = '⭐ ' + s2.toFixed(1);
            score2El.className = 'score-display';
        } else {
            score2El.textContent = '⭐ ?';
            score2El.className = 'score-display waiting';
        }

        document.getElementById('speler1Status').textContent =
            s1 !== null ? '✅ Gedaan!' : (state.timerRunning ? '⏳ Tikken!' : 'Wacht op start...');
        document.getElementById('speler2Status').textContent =
            s2 !== null ? '✅ Gedaan!' : (state.timerRunning ? '⏳ Tikken!' : 'Wacht op start...');
    }

    function updateKnoppen() {
        const isEerste = state.index === 0 && state.ronde === 1;
        const isLaatste = state.index === LEERLINGEN.length - 1 && state.ronde === 2;

        document.getElementById('btnVorige').disabled = isEerste;
        document.getElementById('btnVolgende').disabled = !(state.speler1Score !== null && state.speler2Score !== null);
        document.getElementById('btnStart').disabled = state.timerRunning;
    }

    // ============================================================
    // SCORE OVERZICHT
    // ============================================================
    function updateScoreOverzicht() {
        const grid = document.getElementById('scoreGrid');

        // Maak lijst van (naam, besteScore)
        const lijst = LEERLINGEN.map(naam => ({
            naam: naam,
            score: ALLE_SCORES[naam]
        }));

        // Sorteer op score (hoog naar laag), null komt onderaan
        lijst.sort((a, b) => {
            if (a.score === null && b.score === null) return 0;
            if (a.score === null) return 1;
            if (b.score === null) return -1;
            return b.score - a.score;
        });

        if (lijst.every(item => item.score === null)) {
            grid.innerHTML = `<div style="text-align:center; color:#a08f7e; padding:12px; grid-column:1/-1;">
                Nog geen scores... 🎯
            </div>`;
            return;
        }

        const medailles = ['🥇', '🥈', '🥉'];

        grid.innerHTML = lijst.map((item, pos) => {
            const medaille = pos < 3 && item.score !== null ? medailles[pos] : '';
            const isBeste = pos === 0 && item.score !== null;
            const scoreText = item.score !== null ? item.score.toFixed(1) : '—';

            return `
                <div class="score-item ${isBeste ? 'beste' : ''}">
                    <span class="medaille">${medaille}</span>
                    <span class="naam">${item.naam}</span>
                    <span class="score ${item.score === null ? 'geen' : ''}">${scoreText}</span>
                </div>
            `;
        }).join('');
    }

    // ============================================================
    // TIMER LOGICA
    // ============================================================
    function startTimer() {
        if (state.timerRunning) return;
        if (state.speler1Score !== null && state.speler2Score !== null) return;

        state.speler1Score = null;
        state.speler2Score = null;
        state.speler1Gedaan = false;
        state.speler2Gedaan = false;
        state.timerValue = 5;

        const timer1 = document.getElementById('speler1Timer');
        const timer2 = document.getElementById('speler2Timer');
        timer1.textContent = '5';
        timer1.className = 'timer-display';
        timer1.style.color = '#f9d89c';
        timer2.textContent = '5';
        timer2.className = 'timer-display';
        timer2.style.color = '#f9d89c';

        state.timerRunning = true;
        state.timerStart = Date.now();
        document.getElementById('btnStart').disabled = true;

        document.getElementById('speler1Status').textContent = '⏳ Tikken!';
        document.getElementById('speler2Status').textContent = '⏳ Tikken!';

        if (state.timerInterval) clearInterval(state.timerInterval);
        state.timerInterval = setInterval(() => {
            const elapsed = (Date.now() - state.timerStart) / 1000;
            const waarde = 5 - elapsed;
            state.timerValue = waarde;

            const display = waarde.toFixed(1);
            timer1.textContent = display;
            timer2.textContent = display;

            if (waarde < 0) {
                timer1.style.color = '#f28b82';
                timer2.style.color = '#f28b82';
            } else {
                timer1.style.color = '#f9d89c';
                timer2.style.color = '#f9d89c';
            }
        }, 50);
    }

    function stopTimer(speler) {
        if (!state.timerRunning) return;
        if (speler === 1 && state.speler1Gedaan) return;
        if (speler === 2 && state.speler2Gedaan) return;

        const waarde = state.timerValue;
        let score = Math.max(0, 10 - (Math.abs(waarde) * 2));
        score = Math.round(score * 10) / 10;

        const idx = state.volgorde[state.index];
        const naam = LEERLINGEN[idx];

        if (speler === 1) {
            state.speler1Score = score;
            state.speler1Gedaan = true;
            // Opslaan in pogingen
            if (!state.pogingen1[idx]) state.pogingen1[idx] = [];
            state.pogingen1[idx][state.ronde - 1] = score;
            document.getElementById('speler1Status').textContent = '✅ Gedaan!';
        } else {
            state.speler2Score = score;
            state.speler2Gedaan = true;
            if (!state.pogingen2[idx]) state.pogingen2[idx] = [];
            state.pogingen2[idx][state.ronde - 1] = score;
            document.getElementById('speler2Status').textContent = '✅ Gedaan!';
        }

        updateUI();

        if (state.speler1Gedaan && state.speler2Gedaan) {
            clearInterval(state.timerInterval);
            state.timerInterval = null;
            state.timerRunning = false;
            document.getElementById('btnStart').disabled = false;

            // Bepaal de beste score voor deze leerling (hoogste van beide spelers)
            const s1 = state.pogingen1[idx] || [];
            const s2 = state.pogingen2[idx] || [];
            const alleScores = [...s1, ...s2].filter(s => s !== undefined);
            if (alleScores.length > 0) {
                const beste = Math.max(...alleScores);
                ALLE_SCORES[naam] = beste;
            }

            updateKnoppen();
            updateScoreOverzicht();
        }
    }

    // ============================================================
    // TOETSEN
    // ============================================================
    document.addEventListener('keydown', (e) => {
        // Spatiebalk = Speler 1
        if (e.code === 'Space') {
            e.preventDefault();
            stopTimer(1);
        }
        // Numerieke Enter = Speler 2
        if (e.code === 'NumpadEnter' || (e.key === 'Enter' && e.location === 3)) {
            e.preventDefault();
            stopTimer(2);
        }
    });

    // ============================================================
    // KNOBBEN
    // ============================================================
    document.getElementById('btnStart').addEventListener('click', startTimer);

    document.getElementById('btnVolgende').addEventListener('click', () => {
        if (state.ronde === 1) {
            state.ronde = 2;
            state.speler1Score = null;
            state.speler2Score = null;
            state.timerRunning = false;
            if (state.timerInterval) {
                clearInterval(state.timerInterval);
                state.timerInterval = null;
            }
            updateUI();
            updateKnoppen();
            document.getElementById('btnStart').disabled = false;
        } else {
            state.ronde = 1;
            state.index++;
            state.speler1Score = null;
            state.speler2Score = null;
            state.timerRunning = false;
            if (state.timerInterval) {
                clearInterval(state.timerInterval);
                state.timerInterval = null;
            }
            updateUI();
            updateKnoppen();
            document.getElementById('btnStart').disabled = false;
        }
    });

    document.getElementById('btnVorige').addEventListener('click', () => {
        const idx = state.volgorde[state.index];
        const naam = LEERLINGEN[idx];

        if (state.ronde === 2) {
            state.ronde = 1;
            if (state.pogingen1[idx]) state.pogingen1[idx].pop();
            if (state.pogingen2[idx]) state.pogingen2[idx].pop();
            state.speler1Score = null;
            state.speler2Score = null;
            state.timerRunning = false;
            if (state.timerInterval) {
                clearInterval(state.timerInterval);
                state.timerInterval = null;
            }
            // Update beste score
            const s1 = state.pogingen1[idx] || [];
            const s2 = state.pogingen2[idx] || [];
            const alleScores = [...s1, ...s2].filter(s => s !== undefined);
            if (alleScores.length > 0) {
                ALLE_SCORES[naam] = Math.max(...alleScores);
            } else {
                ALLE_SCORES[naam] = null;
            }
            updateUI();
            updateKnoppen();
            updateScoreOverzicht();
            document.getElementById('btnStart').disabled = false;
        } else if (state.ronde === 1 && state.index > 0) {
            state.index--;
            state.ronde = 2;
            const prevIdx = state.volgorde[state.index];
            const prevNaam = LEERLINGEN[prevIdx];
            if (state.pogingen1[prevIdx]) state.pogingen1[prevIdx].pop();
            if (state.pogingen2[prevIdx]) state.pogingen2[prevIdx].pop();
            state.speler1Score = null;
            state.speler2Score = null;
            state.timerRunning = false;
            if (state.timerInterval) {
                clearInterval(state.timerInterval);
                state.timerInterval = null;
            }
            const s1 = state.pogingen1[prevIdx] || [];
            const s2 = state.pogingen2[prevIdx] || [];
            const alleScores = [...s1, ...s2].filter(s => s !== undefined);
            if (alleScores.length > 0) {
                ALLE_SCORES[prevNaam] = Math.max(...alleScores);
            } else {
                ALLE_SCORES[prevNaam] = null;
            }
            updateUI();
            updateKnoppen();
            updateScoreOverzicht();
            document.getElementById('btnStart').disabled = false;
        }
    });

    document.getElementById('btnReset').addEventListener('click', () => {
        if (confirm('Weet je zeker dat je alle scores wilt resetten?')) {
            LEERLINGEN.forEach(naam => { ALLE_SCORES[naam] = null; });
            init();
        }
    });

    // ============================================================
    // START
    // ============================================================
    laadData();
</script>

</body>
</html>
