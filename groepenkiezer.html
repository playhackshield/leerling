<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Groepenmaker 🎯</title>
    <style>
        /* ===== RESET & BASIS ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: linear-gradient(135deg, #fdf8ed 0%, #fef6e8 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .app {
            max-width: 1100px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 60px 60px 40px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            padding: 40px 45px 50px;
            transition: all 0.2s;
            border: 2px solid #fff9f0;
        }
        h1 {
            font-size: 3rem;
            font-weight: 700;
            color: #3d2c1b;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }
        .subhead {
            font-size: 1.5rem;
            color: #6b4f32;
            margin-bottom: 25px;
            border-left: 8px solid #f9b83a;
            padding-left: 20px;
            background: #fff3e0;
            border-radius: 0 30px 30px 0;
            line-height: 1.4;
        }
        .subhead span {
            background: #f9b83a;
            color: #2d1f0f;
            padding: 0 12px;
            border-radius: 40px;
            font-weight: 600;
        }
        /* ===== KNOPS ===== */
        .btn {
            background: #f9b83a;
            border: none;
            color: #2d1f0f;
            font-weight: 700;
            font-size: 1.6rem;
            padding: 18px 42px;
            border-radius: 120px;
            cursor: pointer;
            box-shadow: 0 8px 0 #b57c1e;
            transition: all 0.07s ease;
            display: inline-flex;
            align-items: center;
            gap: 16px;
            border: 2px solid #ffeac2;
            letter-spacing: 1px;
        }
        .btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #b57c1e;
        }
        .btn:disabled {
            opacity: 0.4;
            transform: translateY(4px);
            box-shadow: 0 4px 0 #b57c1e;
            pointer-events: none;
        }
        .btn-secondary {
            background: #e5d9cd;
            box-shadow: 0 8px 0 #a08f7e;
            border-color: #f3ede7;
            color: #3d2c1b;
        }
        .btn-success {
            background: #6fcf97;
            box-shadow: 0 8px 0 #219653;
            border-color: #b8f0d0;
            color: #1a3a2a;
        }
        .btn-danger {
            background: #f28b82;
            box-shadow: 0 8px 0 #b23c33;
            border-color: #fcd4d0;
            color: #3d1c1a;
        }
        .btn-small {
            font-size: 1.3rem;
            padding: 12px 28px;
            gap: 10px;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        /* ===== LEERLINGEN OVERZICHT (kris-kras) ===== */
        .grid-namen {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px 25px;
            margin: 30px 0 20px;
        }
        .naam-blok {
            background: white;
            padding: 14px 28px;
            border-radius: 120px;
            font-size: 2rem;
            font-weight: 600;
            color: #2d1f0f;
            box-shadow: 0 8px 0 #d6c6b5, 0 6px 16px rgba(0, 0, 0, 0.08);
            border: 2px solid #f2e3d4;
            transition: 0.1s ease;
        }
        /* ===== TIMER ===== */
        .timer-display {
            font-size: 8rem;
            font-weight: 800;
            background: #2d1f0f;
            color: #f9d89c;
            padding: 20px 30px;
            border-radius: 80px;
            text-align: center;
            margin: 20px 0 10px;
            letter-spacing: 6px;
            box-shadow: inset 0 -10px 0 #5a4029;
            font-variant-numeric: tabular-nums;
        }
        .timer-sub {
            font-size: 1.7rem;
            color: #3d2c1b;
            font-weight: 600;
            background: #f2e3d4;
            display: inline-block;
            padding: 8px 36px;
            border-radius: 120px;
            margin-bottom: 12px;
        }
        .score-big {
            font-size: 4rem;
            font-weight: 700;
            color: #1f7a4a;
            background: #e1f5e8;
            padding: 8px 40px;
            border-radius: 120px;
            display: inline-block;
            margin: 6px 0;
        }
        .poging-label {
            font-size: 1.9rem;
            background: #f9e6cf;
            padding: 8px 28px;
            border-radius: 80px;
        }
        /* ===== GROEPEN ===== */
        .groep-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px 30px;
            justify-content: center;
            margin: 20px 0;
        }
        .groep-card {
            background: white;
            border-radius: 40px;
            padding: 20px 25px 25px;
            min-width: 180px;
            flex: 1 1 180px;
            box-shadow: 0 12px 0 #d6c6b5, 0 8px 24px rgba(0, 0, 0, 0.08);
            border: 2px solid #f2e3d4;
        }
        .groep-card h3 {
            font-size: 2rem;
            border-bottom: 4px solid #f9b83a;
            padding-bottom: 6px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .groep-card ul {
            list-style: none;
            font-size: 1.5rem;
            padding-left: 4px;
        }
        .groep-card ul li {
            padding: 6px 0;
            border-bottom: 1px dashed #ece3d9;
        }
        /* ===== RONDE SCORE ===== */
        .ronde-score-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 25px 40px;
            justify-content: center;
            margin: 25px 0;
        }
        .score-item {
            background: white;
            border-radius: 50px;
            padding: 14px 30px 14px 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 6px 0 #d6c6b5;
            border: 2px solid #f2e3d4;
            font-size: 1.8rem;
            font-weight: 600;
        }
        .score-item input {
            width: 80px;
            font-size: 2rem;
            text-align: center;
            border: 3px solid #d6c6b5;
            border-radius: 30px;
            padding: 4px 0;
            font-weight: 700;
            background: #fcf8f2;
        }
        .score-item input:focus {
            outline: 2px solid #f9b83a;
            border-color: #f9b83a;
        }
        /* ===== EINDSTAND ===== */
        .eindstand-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            margin: 25px 0;
        }
        .eind-card {
            background: white;
            border-radius: 40px;
            padding: 20px 30px 28px;
            min-width: 150px;
            flex: 1 1 140px;
            box-shadow: 0 10px 0 #d6c6b5;
            border: 2px solid #f2e3d4;
            text-align: center;
        }
        .eind-card .positie {
            font-size: 3rem;
        }
        .eind-card .groep-naam {
            font-size: 2rem;
            font-weight: 700;
        }
        .eind-card .totaal {
            font-size: 2.8rem;
            font-weight: 800;
            background: #f9b83a;
            border-radius: 80px;
            padding: 0 20px;
            display: inline-block;
            margin-top: 8px;
        }
        .eind-card.goud {
            background: #fff6d0;
            border-color: #f9b83a;
        }
        .eind-card.zilver {
            background: #f0f0f0;
            border-color: #b0b0b0;
        }
        .eind-card.brons {
            background: #f5e6d6;
            border-color: #c69c7a;
        }
        /* ===== HIDDEN ===== */
        .screen {
            display: none;
        }
        .screen.active {
            display: block;
        }
        /* ===== RESPONSIVE ===== */
        @media (max-width: 700px) {
            .app {
                padding: 24px 18px;
            }
            h1 {
                font-size: 2.4rem;
            }
            .timer-display {
                font-size: 5rem;
            }
            .naam-blok {
                font-size: 1.5rem;
                padding: 10px 18px;
            }
            .btn {
                font-size: 1.3rem;
                padding: 14px 28px;
            }
            .groep-card {
                min-width: 130px;
            }
            .score-item {
                font-size: 1.4rem;
                flex-wrap: wrap;
                justify-content: center;
            }
            .score-item input {
                width: 70px;
                font-size: 1.6rem;
            }
        }
        /* ===== HULP ===== */
        .text-center {
            text-align: center;
        }
        .mt-10 {
            margin-top: 10px;
        }
        .mt-20 {
            margin-top: 20px;
        }
        .mb-10 {
            margin-bottom: 10px;
        }
        .mb-20 {
            margin-bottom: 20px;
        }
        .flex-center {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }
        .uitleg {
            background: #f2e3d4;
            padding: 14px 24px;
            border-radius: 60px;
            font-size: 1.5rem;
            font-weight: 500;
            color: #2d1f0f;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="app" id="app">

    <!-- ============================================ -->
    <!-- 1. OVERZICHT LEERLINGEN                       -->
    <!-- ============================================ -->
    <div class="screen active" id="screen-overzicht">
        <div class="text-center">
            <h1>👥 Dit zijn de deelnemers!</h1>
            <div class="subhead" style="border-left-color:#f9b83a; background: #fcf2e3; display:inline-block; padding:6px 28px; border-radius:80px;">
                ⭐ <span id="aantalLeerlingen"></span> leerlingen
            </div>
            <div class="grid-namen" id="naamGrid"></div>
            <button class="btn" id="btnStartTimer">🚀 START</button>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- 2. TIMERSPEL                                 -->
    <!-- ============================================ -->
    <div class="screen" id="screen-timer">
        <div class="text-center">
            <div class="flex-center mb-10">
                <span class="poging-label" id="timerPogingLabel">Poging 1 van 2</span>
                <span class="uitleg" id="timerNaamDisplay" style="background:#f9b83a;">👤</span>
            </div>

            <div class="timer-display" id="timerDisplay">5</div>

            <div class="flex-center" style="gap:30px; margin:8px 0 18px;">
                <span style="font-size:2rem; font-weight:600;">⏱️ tik zo dicht mogelijk bij <span style="background:#2d1f0f; color:#f9d89c; padding:0 20px; border-radius:60px;">0</span></span>
            </div>

            <div id="timerScoreArea" class="hidden" style="margin:6px 0 16px;">
                <span class="score-big" id="timerScoreDisplay">⭐ 0</span>
            </div>

            <div class="btn-group">
                <button class="btn btn-secondary btn-small" id="timerVorige">⬅️ Vorige</button>
                <button class="btn btn-success btn-small" id="timerStartKnop">▶️ START</button>
                <button class="btn btn-small" id="timerVolgende">Volgende ➡️</button>
            </div>

            <div style="margin-top:18px; font-size:1.2rem; color:#6b4f32;">
                <span id="timerProgress"></span>
            </div>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- 3. GROEPEN BEPALEN                          -->
    <!-- ============================================ -->
    <div class="screen" id="screen-bepaal">
        <div class="text-center">
            <h1>🎉 Alle leerlingen zijn geweest!</h1>
            <div class="subhead" style="display:inline-block; background:#f2e3d4; border-left-color:#6fcf97; padding:8px 32px; border-radius:80px;">
                🤖 De computer gaat nu de groepen bepalen op basis van de spelresultaten
            </div>
            <div style="margin:30px 0;">
                <span style="font-size:6rem;">🧠</span>
            </div>
            <button class="btn btn-success" id="btnBepaalGroepen">🔮 Bepaal groepen</button>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- 4. GROEPEN TONEN                            -->
    <!-- ============================================ -->
    <div class="screen" id="screen-groepen">
        <div class="text-center">
            <h1>📋 De groepen zijn gemaakt!</h1>
            <div class="groep-container" id="groepContainer"></div>
            <button class="btn" id="btnStartSpellen">🎮 Begin met spellen</button>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- 5. RONDE                                    -->
    <!-- ============================================ -->
    <div class="screen" id="screen-ronde">
        <div class="text-center">
            <h1 id="rondeTitel">🏁 Ronde 1</h1>
            <div class="subhead" style="display:inline-block; background:#fcf2e3; border-left-color:#f28b82; padding:8px 32px; border-radius:80px;" id="rondeSpelNaam">
                🎯 Rekensprint
            </div>

            <div class="ronde-score-grid" id="rondeScoreGrid"></div>

            <div class="btn-group">
                <button class="btn btn-secondary btn-small" id="rondeVorige">⬅️ Vorige ronde</button>
                <button class="btn btn-small" id="rondeVolgende">Volgende ronde ➡️</button>
            </div>
            <div style="margin-top:12px; font-size:1.2rem; color:#6b4f32;">
                <span id="rondeProgress"></span>
            </div>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- 6. EINDSTAND                                -->
    <!-- ============================================ -->
    <div class="screen" id="screen-eind">
        <div class="text-center">
            <h1>🏆 Eindstand</h1>
            <div class="eindstand-grid" id="eindstandGrid"></div>
            <div style="margin-top:20px; font-size:1.8rem; background:#f2e3d4; display:inline-block; padding:8px 30px; border-radius:80px;">
                🎊 Gefeliciteerd allemaal!
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary btn-small" id="eindVorige">⬅️ Vorige ronde</button>
                <button class="btn btn-danger btn-small" id="eindReset">🔄 Opnieuw beginnen</button>
            </div>
        </div>
    </div>

</div>

<script>
    // ============================================================
    //  DATA (hardcoded JSON – pas hier jouw gegevens aan!)
    // ============================================================
    const DATA = {
        leerlingen: [
            { naam: "Jantje", groep: 1 },
            { naam: "Pietje", groep: 2 },
            { naam: "Eva", groep: 1 },
            { naam: "Mohammed", groep: 0 },
            { naam: "Sanne", groep: 0 },
            { naam: "Fatima", groep: 0 },
            { naam: "Ahmed", groep: 0 }
        ],
        spellen: [
            "Rekensprint",
            "Woordenschat",
            "Tafels",
            "Topografie"
        ]
    };

    // ============================================================
    //  GLOBALE STATE
    // ============================================================
    let state = {
        // leerlingen
        leerlingen: [], // array van { naam, groep, score? }
        groepen: [], // array van arrays: [[{naam,score}], [{naam,score}], ...]
        aantalGroepen: 0,

        // timer
        timerVolgorde: [], // random volgorde van indices
        timerIndex: 0, // huidige leerling in de volgorde
        timerPoging: 1, // 1 of 2
        timerStartTime: 0,
        timerInterval: null,
        timerRunning: false,
        timerTijd: 5,
        timerScores: [], // per leerling [poging1, poging2] (alleen voor groep:0)

        // spellen
        rondeIndex: 0,
        rondeScores: [], // per ronde: object { groep1: cijfer, groep2: cijfer, ... }
        totaalScores: [], // per groep: totaal aantal punten

        // huidige scherm
        currentScreen: 'overzicht'
    };

    // ============================================================
    //  INIT
    // ============================================================
    function init() {
        // Leerlingen kopiëren en random volgorde voor timer maken
        state.leerlingen = DATA.leerlingen.map(l => ({ ...l, timerScore: null }));

        // Aantal groepen bepalen (hoogste groepsnummer)
        const maxGroep = state.leerlingen.reduce((max, l) => Math.max(max, l.groep), 0);
        state.aantalGroepen = maxGroep;

        // Groepen array voorbereiden
        state.groepen = Array.from({ length: state.aantalGroepen }, () => []);

        // Timer volgorde: indices van alle leerlingen, random geschud
        const indices = state.leerlingen.map((_, i) => i);
        for (let i = indices.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [indices[i], indices[j]] = [indices[j], indices[i]];
        }
        state.timerVolgorde = indices;

        // Timer scores initialiseren
        state.timerScores = state.leerlingen.map(() => []);

        // Ronde scores initialiseren
        state.rondeScores = [];
        state.totaalScores = Array(state.aantalGroepen).fill(0);

        // Toon eerste scherm
        showScreen('overzicht');
        renderOverzicht();
    }

    // ============================================================
    //  SCREEN MANAGEMENT
    // ============================================================
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
        const el = document.getElementById('screen-' + screenId);
        if (el) el.classList.add('active');
        state.currentScreen = screenId;
    }

    // ============================================================
    //  1. OVERZICHT
    // ============================================================
    function renderOverzicht() {
        // Aantal
        document.getElementById('aantalLeerlingen').textContent = state.leerlingen.length;

        // Namen kris-kras (we hebben al een random volgorde, maar we schudden nog een keer voor de show)
        const namen = state.leerlingen.map(l => l.naam);
        for (let i = namen.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [namen[i], namen[j]] = [namen[j], namen[i]];
        }

        const grid = document.getElementById('naamGrid');
        grid.innerHTML = namen.map(n => `<div class="naam-blok">${n}</div>`).join('');
    }

    document.getElementById('btnStartTimer').addEventListener('click', () => {
        // Reset timer state
        state.timerIndex = 0;
        state.timerPoging = 1;
        state.timerScores = state.leerlingen.map(() => []);
        state.timerRunning = false;
        if (state.timerInterval) {
            clearInterval(state.timerInterval);
            state.timerInterval = null;
        }
        showScreen('timer');
        renderTimer();
    });

    // ============================================================
    //  2. TIMER
    // ============================================================
    function renderTimer() {
        const idx = state.timerVolgorde[state.timerIndex];
        const leerling = state.leerlingen[idx];

        document.getElementById('timerNaamDisplay').textContent = '👤 ' + leerling.naam;
        document.getElementById('timerPogingLabel').textContent = `Poging ${state.timerPoging} van 2`;

        // Score tonen als die er al is voor deze poging
        const scores = state.timerScores[idx] || [];
        const scoreArea = document.getElementById('timerScoreArea');
        const scoreDisplay = document.getElementById('timerScoreDisplay');
        if (scores.length >= state.timerPoging) {
            scoreArea.classList.remove('hidden');
            const s = scores[state.timerPoging - 1];
            scoreDisplay.textContent = '⭐ ' + s;
        } else {
            scoreArea.classList.add('hidden');
        }

        // Timer reset
        state.timerTijd = 5;
        document.getElementById('timerDisplay').textContent = '5';
        state.timerRunning = false;
        if (state.timerInterval) {
            clearInterval(state.timerInterval);
            state.timerInterval = null;
        }

        // Knoppen
        document.getElementById('timerStartKnop').disabled = false;
        document.getElementById('timerStartKnop').textContent = '▶️ START';
        document.getElementById('timerVolgende').disabled = true;
        document.getElementById('timerVorige').disabled = (state.timerIndex === 0 && state.timerPoging === 1);

        // Progress
        const totaal = state.leerlingen.length;
        const gedaan = state.timerIndex;
        document.getElementById('timerProgress').textContent = `${gedaan} van ${totaal} leerlingen gedaan`;
    }

    // START knop timer
    document.getElementById('timerStartKnop').addEventListener('click', function() {
        if (state.timerRunning) return; // al aan het lopen

        const idx = state.timerVolgorde[state.timerIndex];
        const scores = state.timerScores[idx] || [];
        // Als deze poging al een score heeft, mag je niet opnieuw starten
        if (scores.length >= state.timerPoging) return;

        // Start timer
        state.timerTijd = 5;
        document.getElementById('timerDisplay').textContent = '5';
        state.timerRunning = true;
        this.disabled = true;
        this.textContent = '⏳ ...';

        // Verberg oude score
        document.getElementById('timerScoreArea').classList.add('hidden');

        // Start aftellen
        const startTime = Date.now();
        state.timerStartTime = startTime;

        if (state.timerInterval) clearInterval(state.timerInterval);
        state.timerInterval = setInterval(() => {
            const elapsed = (Date.now() - startTime) / 1000;
            const remaining = Math.max(0, 5 - elapsed);
            const display = Math.ceil(remaining);
            document.getElementById('timerDisplay').textContent = Math.max(0, display);

            if (remaining <= 0) {
                clearInterval(state.timerInterval);
                state.timerInterval = null;
                state.timerRunning = false;
                document.getElementById('timerStartKnop').disabled = false;
                document.getElementById('timerStartKnop').textContent = '▶️ START';
                // Geen score omdat er niet gedrukt is
            }
        }, 100);
    });

    // Tik / druk op timer (via knop of spatiebalk)
    function handleTimerTick() {
        if (!state.timerRunning) return;

        const idx = state.timerVolgorde[state.timerIndex];
        const elapsed = (Date.now() - state.timerStartTime) / 1000;
        const verschil = Math.abs(5 - elapsed);

        // Score berekenen: 10 - (verschil * 2), min 0
        let score = Math.max(0, 10 - (verschil * 2));
        score = Math.round(score * 10) / 10; // 1 decimaal

        // Opslaan
        if (!state.timerScores[idx]) state.timerScores[idx] = [];
        state.timerScores[idx][state.timerPoging - 1] = score;

        // Stop timer
        state.timerRunning = false;
        if (state.timerInterval) {
            clearInterval(state.timerInterval);
            state.timerInterval = null;
        }
        document.getElementById('timerStartKnop').disabled = false;
        document.getElementById('timerStartKnop').textContent = '▶️ START';

        // Toon score
        const scoreArea = document.getElementById('timerScoreArea');
        scoreArea.classList.remove('hidden');
        document.getElementById('timerScoreDisplay').textContent = '⭐ ' + score;

        // Volgende knop inschakelen
        document.getElementById('timerVolgende').disabled = false;
    }

    // Klik op de timer display om te tikken
    document.getElementById('timerDisplay').addEventListener('click', handleTimerTick);

    // Spatiebalk
    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && state.currentScreen === 'timer') {
            e.preventDefault();
            handleTimerTick();
        }
    });

    // Volgende knop timer
    document.getElementById('timerVolgende').addEventListener('click', function() {
        const idx = state.timerVolgorde[state.timerIndex];
        const scores = state.timerScores[idx] || [];

        // Check of deze poging een score heeft
        if (scores.length < state.timerPoging) {
            // Geen score, mag niet verder
            alert('⏳ Eerst de timer starten en tikken!');
            return;
        }

        if (state.timerPoging === 1) {
            // Ga naar poging 2
            state.timerPoging = 2;
            renderTimer();
            document.getElementById('timerVolgende').disabled = true;
            document.getElementById('timerScoreArea').classList.add('hidden');
        } else {
            // Poging 2 gedaan -> volgende leerling
            state.timerPoging = 1;
            state.timerIndex++;
            if (state.timerIndex >= state.timerVolgorde.length) {
                // Alle leerlingen zijn geweest
                showScreen('bepaal');
                return;
            }
            renderTimer();
            document.getElementById('timerVolgende').disabled = true;
        }
    });

    // Vorige knop timer
    document.getElementById('timerVorige').addEventListener('click', function() {
        if (state.timerPoging === 2) {
            // Terug naar poging 1 van dezelfde leerling
            state.timerPoging = 1;
            const idx = state.timerVolgorde[state.timerIndex];
            // Verwijder poging 2 score
            if (state.timerScores[idx] && state.timerScores[idx].length > 1) {
                state.timerScores[idx].pop();
            }
            renderTimer();
            document.getElementById('timerVolgende').disabled = true;
            document.getElementById('timerScoreArea').classList.add('hidden');
        } else if (state.timerPoging === 1 && state.timerIndex > 0) {
            // Terug naar vorige leerling, poging 2
            state.timerIndex--;
            state.timerPoging = 2;
            const idx = state.timerVolgorde[state.timerIndex];
            // Verwijder poging 2 van die leerling (als die er is)
            if (state.timerScores[idx] && state.timerScores[idx].length > 1) {
                state.timerScores[idx].pop();
            }
            renderTimer();
            document.getElementById('timerVolgende').disabled = false;
            document.getElementById('timerScoreArea').classList.add('hidden');
        } else {
            // Eerste leerling, poging 1 -> niets doen
        }
        // Update vorige knop status
        document.getElementById('timerVorige').disabled = (state.timerIndex === 0 && state.timerPoging === 1);
    });

    // ============================================================
    //  3. GROEPEN BEPALEN
    // ============================================================
    document.getElementById('btnBepaalGroepen').addEventListener('click', function() {
        // Verdeel groep:0 leerlingen op basis van gemiddelde score
        // Eerst alle leerlingen met groep:0 verzamelen met hun gemiddelde score
        const zonderGroep = [];
        state.leerlingen.forEach((l, idx) => {
            if (l.groep === 0) {
                const scores = state.timerScores[idx] || [];
                const gem = scores.length > 0 ? scores.reduce((a, b) => a + b, 0) / scores.length : 0;
                zonderGroep.push({ index: idx, naam: l.naam, score: gem });
            }
        });

        // Sorteer op score (hoog naar laag)
        zonderGroep.sort((a, b) => b.score - a.score);

        // Verdeel om en om over de groepen (1,2,3,...)
        let groepIndex = 0;
        zonderGroep.forEach(item => {
            // Groep nummer is 1-based, maar array is 0-based
            const g = groepIndex % state.aantalGroepen;
            item.toegewezenGroep = g + 1;
            // Update de leerling in de lijst
            state.leerlingen[item.index].groep = g + 1;
            groepIndex++;
        });

        // Bouw groepen arrays
        state.groepen = Array.from({ length: state.aantalGroepen }, () => []);
        state.leerlingen.forEach(l => {
            if (l.groep > 0 && l.groep <= state.aantalGroepen) {
                state.groepen[l.groep - 1].push(l);
            }
        });

        // Toon groepen
        showScreen('groepen');
        renderGroepen();
    });

    // ============================================================
    //  4. GROEPEN TONEN
    // ============================================================
    function renderGroepen() {
        const container = document.getElementById('groepContainer');
        const emojis = ['🦁', '🐧', '🐬', '🦊', '🐼', '🐨'];

        container.innerHTML = state.groepen.map((groep, i) => {
            const emoji = emojis[i % emojis.length];
            const namen = groep.map(l => l.naam).join(', ');
            return `
                <div class="groep-card">
                    <h3>${emoji} Groep ${i+1}</h3>
                    <ul>
                        ${groep.map(l => `<li>${l.naam}</li>`).join('')}
                    </ul>
                </div>
            `;
        }).join('');
    }

    document.getElementById('btnStartSpellen').addEventListener('click', () => {
        // Reset spel scores
        state.rondeIndex = 0;
        state.rondeScores = [];
        state.totaalScores = Array(state.aantalGroepen).fill(0);

        showScreen('ronde');
        renderRonde();
    });

    // ============================================================
    //  5. RONDE
    // ============================================================
    function renderRonde() {
        const ronde = state.rondeIndex;
        const totaal = DATA.spellen.length;

        document.getElementById('rondeTitel').textContent = `🏁 Ronde ${ronde + 1}`;
        document.getElementById('rondeSpelNaam').textContent = `🎯 ${DATA.spellen[ronde]}`;
        document.getElementById('rondeProgress').textContent = `Ronde ${ronde + 1} van ${totaal}`;

        // Scores voor deze ronde ophalen of initialiseren
        if (!state.rondeScores[ronde]) {
            state.rondeScores[ronde] = Array(state.aantalGroepen).fill(0);
        }

        const grid = document.getElementById('rondeScoreGrid');
        const emojis = ['🦁', '🐧', '🐬', '🦊', '🐼', '🐨'];

        grid.innerHTML = state.groepen.map((groep, i) => {
            const score = state.rondeScores[ronde][i] || 0;
            const emoji = emojis[i % emojis.length];
            return `
                <div class="score-item">
                    ${emoji} Groep ${i+1}
                    <input type="number" min="0" max="10" step="1" value="${score}" data-groep="${i}" data-ronde="${ronde}" class="ronde-input" />
                </div>
            `;
        }).join('');

        // Event listeners voor input veranderingen
        document.querySelectorAll('.ronde-input').forEach(input => {
            input.addEventListener('input', function() {
                const r = parseInt(this.dataset.ronde);
                const g = parseInt(this.dataset.groep);
                let val = parseFloat(this.value);
                if (isNaN(val)) val = 0;
                if (val < 0) val = 0;
                if (val > 10) val = 10;
                state.rondeScores[r][g] = val;
                // Totaal bijwerken
                berekenTotaal();
            });
        });

        // Knoppen
        document.getElementById('rondeVorige').disabled = (state.rondeIndex === 0);
        document.getElementById('rondeVolgende').disabled = false;
        if (state.rondeIndex === totaal - 1) {
            document.getElementById('rondeVolgende').textContent = '🏆 Eindstand';
        } else {
            document.getElementById('rondeVolgende').textContent = 'Volgende ronde ➡️';
        }

        // Totaal berekenen
        berekenTotaal();
    }

    function berekenTotaal() {
        state.totaalScores = Array(state.aantalGroepen).fill(0);
        state.rondeScores.forEach(ronde => {
            ronde.forEach((score, i) => {
                state.totaalScores[i] += score;
            });
        });
    }

    // Volgende ronde
    document.getElementById('rondeVolgende').addEventListener('click', function() {
        const totaal = DATA.spellen.length;
        if (state.rondeIndex < totaal - 1) {
            state.rondeIndex++;
            renderRonde();
        } else {
            // Eindstand
            berekenTotaal();
            showScreen('eind');
            renderEindstand();
        }
    });

    // Vorige ronde
    document.getElementById('rondeVorige').addEventListener('click', function() {
        if (state.rondeIndex > 0) {
            state.rondeIndex--;
            renderRonde();
        }
    });

    // ============================================================
    //  6. EINDSTAND
    // ============================================================
    function renderEindstand() {
        const grid = document.getElementById('eindstandGrid');

        // Maak array met { groepIndex, totaal }
        const scores = state.totaalScores.map((totaal, i) => ({ index: i, totaal }));
        // Sorteer op totaal (hoog naar laag)
        scores.sort((a, b) => b.totaal - a.totaal);

        const emojis = ['🦁', '🐧', '🐬', '🦊', '🐼', '🐨'];
        const medailles = ['🥇', '🥈', '🥉', '4️⃣', '5️⃣', '6️⃣'];

        grid.innerHTML = scores.map((item, pos) => {
            const i = item.index;
            const emoji = emojis[i % emojis.length];
            const medaille = medailles[pos] || '🏅';
            let klasse = '';
            if (pos === 0) klasse = 'goud';
            else if (pos === 1) klasse = 'zilver';
            else if (pos === 2) klasse = 'brons';

            return `
                <div class="eind-card ${klasse}">
                    <div class="positie">${medaille}</div>
                    <div class="groep-naam">${emoji} Groep ${i+1}</div>
                    <div class="totaal">${item.totaal}</div>
                    <div style="font-size:1rem; color:#6b4f32; margin-top:6px;">punten</div>
                </div>
            `;
        }).join('');
    }

    // Vorige ronde vanaf eindstand
    document.getElementById('eindVorige').addEventListener('click', () => {
        state.rondeIndex = DATA.spellen.length - 1;
        showScreen('ronde');
        renderRonde();
    });

    // Reset
    document.getElementById('eindReset').addEventListener('click', () => {
        if (confirm('Weet je zeker dat je opnieuw wilt beginnen? Alle scores gaan verloren!')) {
            init();
        }
    });

    // ============================================================
    //  START
    // ============================================================
    init();

    console.log('🎯 Groepenmaker geladen! Veel plezier!');
</script>

</body>
</html>
